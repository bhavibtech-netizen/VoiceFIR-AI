<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mic Test - Standalone</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #121212; color: #fff; text-align: center; }
        #log { margin-top: 20px; text-align: left; background: #000; padding: 15px; border-radius: 8px; height: 300px; overflow-y: auto; font-family: monospace; border: 1px solid #333; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #2196f3; color: white; border: none; border-radius: 5px; }
        .success { color: #4af626; }
        .error { color: #ff5252; }
    </style>
</head>
<body>
    <h1>Standalone Mic Test</h1>
    <p>This tests your browser's "SpeechRecognition" independently of the main app.</p>
    <button id="start">Start Test</button>
    <div id="log"></div>

    <script>
        const btn = document.getElementById('start');
        const logDiv = document.getElementById('log');

        function log(msg, color = '#eee') {
            const entry = document.createElement('div');
            entry.style.color = color;
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.prepend(entry);
        }

        btn.onclick = () => {
            log('Initializing SpeechRecognition...');
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                log('ERROR: This browser does not support SpeechRecognition.', '#ff5252');
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onstart = () => log('SUCCESS: Engine Started! Please Speak...', '#4af626');
            recognition.onresult = (e) => log('CAPTURED: ' + e.results[0][0].transcript, '#4af626');
            recognition.onerror = (e) => log('ERROR EVENT: ' + e.error, '#ff5252');
            recognition.onend = () => log('Engine Stopped.');

            try {
                recognition.start();
            } catch (e) {
                log('FATAL START ERROR: ' + e.message, '#ff5252');
            }
        };
    </script>
</body>
</html>
