<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup – VoiceFIR AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            /* Fallback variables */
            --primary: #2196f3;
            --bg: #0a0e17;
            --card-bg: rgba(14, 22, 38, 0.95);
            --text: #f0f4ff;
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg) !important;
            background-image: 
                radial-gradient(ellipse at 15% 15%, rgba(33,150,243,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 85%, rgba(33,150,243,0.1) 0%, transparent 50%) !important;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 0;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .auth-container {
            width: 90%;
            max-width: 440px;
            padding: 50px 45px;
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.8);
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.15);
        }

        .auth-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(110deg, #ffffff 20%, #42a5f5 80%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .auth-header h1 span {
            color: var(--primary);
            -webkit-text-fill-color: var(--primary);
        }

        .auth-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            margin-bottom: 35px;
            font-weight: 500;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .input-group {
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 12px;
            font-weight: 700;
            color: #ffffff;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 20px;
            color: #fff;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: rgba(33, 150, 243, 0.1);
            box-shadow: 0 0 25px rgba(33, 150, 243, 0.3);
            transform: scale(1.01);
        }

        .auth-btn {
            background: linear-gradient(135deg, #1e88e5, #42a5f5);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-size: 1.15rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(33, 150, 243, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .auth-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(33, 150, 243, 0.55);
            background: linear-gradient(135deg, #2196f3, #64b5f6);
        }

        .google-btn {
            background: #ffffff;
            color: #0d1117;
            border: none;
            border-radius: 16px;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .google-btn:hover {
            background: #f8fafc;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.25);
        }

        .auth-footer {
            margin-top: 35px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
        }

        .auth-footer a {
            color: #64b5f6;
            text-decoration: none;
            font-weight: 800;
            margin-left: 8px;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
        }

        .auth-footer a:hover {
            border-color: #64b5f6;
        }
    </style>
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--bg-color);">

    <div class="auth-container">
        <div class="auth-header" style="margin-bottom: 25px;">
            <img src="https://upload.wikimedia.org/wikipedia/en/e/ea/Appolice%28emblem%29.png" alt="AP Police Logo" style="width: 100px; margin-bottom: 15px; filter: drop-shadow(0 0 20px rgba(33, 150, 243, 0.4));">
            <div class="logo">
                <h1>VoiceFIR <span>AI</span></h1>
            </div>
        </div>

        <form id="signup-form" class="auth-form">
            <div class="input-group">
                <label for="full-name">Full Name</label>
                <input type="text" id="full-name" placeholder="Enter your full name" required>
            </div>
            <div class="input-group">
                <label for="email">Email ID</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter phone number (e.g. +91 98765 43210)" pattern="^[+0-9\s\-]{1,20}$" required>
            </div>
            <div class="input-group">
                <label for="password">Create Password</label>
                <input type="password" id="password" placeholder="At least 6 characters" required>
            </div>
            <button type="submit" class="auth-btn">Sign Up Now</button>
        </form>

        <div style="margin: 20px 0; color: rgba(255, 255, 255, 0.3); font-size: 0.8rem;">OR CONTINUE WITH</div>

        <button class="google-btn" id="google-signup">
            <svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="20px" height="20px" viewBox="0 0 48 48" class="abcRioButtonSvg">
                <g>
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                    <path fill="none" d="M0 0h48v48H0z"></path>
                </g>
            </svg>
            Continue with Google
        </button>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <!-- Firebase Scripts (Placeholder version - user will need to add their config) -->
    <script type="module" src="auth.js"></script>
</body>
</html>
